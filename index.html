<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Whisky 🐾</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Baloo 2', cursive;

      /* Add the background image with responsive properties */
      background-image: url('image_0.png');
      background-size: cover; /* Cover entire viewport */
      background-position: center; /* Center the image */
      background-attachment: fixed; /* Fix background relative to viewport */
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /* Floating bubbles (subtle animation) */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: floatUp 15s infinite;
    }

    .bubble:nth-child(1) { width: 40px; height: 40px; left: 20%; bottom: -60px; }
    .bubble:nth-child(2) { width: 25px; height: 25px; left: 50%; bottom: -80px; animation-delay: 5s; }
    .bubble:nth-child(3) { width: 35px; height: 35px; left: 80%; bottom: -70px; animation-delay: 8s; }

    @keyframes floatUp {
      to {
        transform: translateY(-120vh);
        opacity: 0;
      }
    }

/* Update Title styling for prominence and texture */
    .title {
      font-size: 5em; /* Significantly larger (was 3em) */
      color: transparent; /* Make text color transparent for masking */
      letter-spacing: 3px;
      font-weight: 800; /* Using the boulder font weight */
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 15px; /* Add space around the paw print */
      cursor: default;
      position: relative; /* Create stacking context for pseudo-element */
    }

    /* Styling for the word 'Whisky' specifically for text-masking */
    .title span.name-text {
        color: transparent; /* Make base color transparent */
        background-image: url('image_1.png'); /* Insert your fur texture URL here */
        background-size: cover; /* Cover the text area */
        background-position: center; /* Center the texture */
        -webkit-background-clip: text; /* Clip background to text shape (Webkit/Safari/Chrome) */
        background-clip: text; /* Clip background to text shape (Standard) */
        position: relative;
        /* We use a drop-shadow filter instead of text-shadow for better result with background-clip */
        filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.5));
    }

    /* Keep paw prints simple and clear */
    .title span.paw-text {
      font-size: 0.8em;
      color: #663300; /* Richer deep brown */
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    }

    /* Responsive title size for mobile screens */
    @media (max-width: 600px) {
      .title {
        font-size: 3em; /* Smaller on mobile to fit the screen */
        letter-spacing: 2px;
        gap: 10px;
      }
    }

  </style>
</head>
<body>

  <!-- Background bubbles -->
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="title">
    <span class="name-text">Whisky</span> <span class="paw-text">🐾</span>
  </div>

</body>
</html>
